services:
  redis:
    image: redis:7-alpine
    container_name: email-relay-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - email-relay-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  postfix:
    image: boky/postfix:latest
    container_name: email-relay-postfix
    restart: unless-stopped
    environment:
      - ALLOWED_SENDER_DOMAINS=*
      - POSTFIX_MYHOSTNAME=${POSTFIX_HOSTNAME:-mail.example.com}
      - SMTP_SASL_PASSWD=
      - RELAYHOST=
    volumes:
      - postfix-data:/var/spool/postfix
      - postfix-logs:/var/log/postfix
    cap_add:
      - NET_ADMIN
    networks:
      - email-relay-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  api:
    build:
      context: ../..
      dockerfile: infra/docker/api.Dockerfile
    container_name: email-relay-api
    restart: unless-stopped
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET}
      - POSTFIX_HOST=postfix
      - POSTFIX_PORT=25
      - NODE_ENV=production
      - HOST=0.0.0.0
      - PORT=3000
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - email-relay-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  worker:
    build:
      context: ../..
      dockerfile: infra/docker/worker.Dockerfile
    container_name: email-relay-worker
    restart: unless-stopped
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - POSTFIX_HOST=postfix
      - POSTFIX_PORT=25
      - NODE_ENV=production
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - email-relay-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  smtp-server:
    build:
      context: ../..
      dockerfile: infra/docker/smtp.Dockerfile
    container_name: email-relay-smtp
    restart: unless-stopped
    ports:
      - "0.0.0.0:25:2525"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - SMTP_HOST=0.0.0.0
      - SMTP_PORT=2525
      - SMTP_RATE_LIMIT_MAX=${SMTP_RATE_LIMIT_MAX:-100}
      - SMTP_RATE_LIMIT_WINDOW=${SMTP_RATE_LIMIT_WINDOW:-3600}
      - NODE_ENV=production
      - LOG_LEVEL=${LOG_LEVEL:-info}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - email-relay-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  admin-panel:
    build:
      context: ../..
      dockerfile: infra/docker/admin.Dockerfile
    container_name: email-relay-admin
    restart: unless-stopped
    networks:
      - email-relay-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    image: nginx:alpine
    container_name: email-relay-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - api
      - admin-panel
    networks:
      - email-relay-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  redis-data:
  postfix-data:
  postfix-logs:

networks:
  email-relay-net:
    driver: bridge
